name: Refresh DDA Dashboard

on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC = 06:30 SAST daily
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install snowflake-connector-python

      - name: Run checks
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
        run: python checks.py

      - name: Rebuild dashboard
        run: python build_dashboard.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json index.html
          git diff --cached --quiet || git commit -m "chore: refresh DDA checks $(date +%Y-%m-%d)"

      - name: Push to main
        run: git push origin main

      - name: Push to gh-pages
        run: git push origin main:gh-pages
